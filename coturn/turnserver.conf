# coturn TURN/STUN Server Configuration
# Docker Desktop / Windows — режим с явными портами (не host network)

# Слушаем на всех интерфейсах внутри контейнера
listening-ip=0.0.0.0

# Порты
listening-port=3478
# TLS отключён для разработки (нет сертификата)
no-tls
no-dtls

# Диапазон портов для медиарелея
# Свободный диапазон на Windows (не перекрывается с Hyper-V резервациями)
# Зарезервированы системой: 49319-49418, 50000+, 51736+ и т.д.
min-port=49200
max-port=49300

# Realm
realm=messenger.local

# HMAC-based временные credentials (RFC 8489)
# Совпадает с turn.secret в application.yml core-api-service
use-auth-secret
static-auth-secret=TURN_SECRET_CHANGE_ME_IN_PROD_9911

# ── Для Docker Desktop на Windows ────────────────────────────────────────────
# external-ip=127.0.0.1  — для локальной разработки (клиент и сервер на одной машине)
# external-ip=1.2.3.4    — для сервера с публичным IP (прод)
external-ip=127.0.0.1
# ─────────────────────────────────────────────────────────────────────────────

# Логирование (stdout для docker logs)
log-file=stdout
verbose

# Безопасность (синтаксис coturn 4.x)
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1
no-multicast-peers
no-cli
fingerprint

# Таймауты
stale-nonce=600
max-allocate-lifetime=3600
channel-lifetime=600
