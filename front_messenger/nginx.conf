server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Максимальный размер загружаемых файлов
    client_max_body_size 50M;

    # ── React SPA: все маршруты → index.html ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Проксирование авторизации → Gateway ───────────────────────────────────
    location /auth/ {
        proxy_pass http://gateway:8083/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Проксирование REST API → Gateway ──────────────────────────────────────
    location /api/ {
        proxy_pass http://gateway:8083/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Аватарки ──────────────────────────────────────────────────────────────
    location /avatars/ {
        proxy_pass http://gateway:8083/avatars/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── WebSocket сигналинг → Gateway → WebSocket Server ─────────────────────
    location /ws/ {
        proxy_pass http://gateway:8083/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Пользовательские prekey-bundle ────────────────────────────────────────
    location /users/ {
        proxy_pass http://gateway:8083/users/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Статические ресурсы — кэширование ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
